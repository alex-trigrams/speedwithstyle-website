<!-- ===== HEADER ===== -->
<header id="site-header" style="position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:2px solid #EDF4FA;transition:box-shadow .3s ease">
  <div class="sws-wrap" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:10px;padding-bottom:10px">
    <a href="/#top" aria-label="Speed With Style, home" style="display:flex;align-items:center"><img src="/assets/sws-logo.png" alt="Speed With Style" style="width:132px;height:auto"></a>
    <nav class="sws-desktop" aria-label="Main" style="display:flex;align-items:center;gap:24px">
      <a href="/#programs" style="font-weight:700;font-size:16px;color:#0A0A0A;text-decoration:none">Programs</a>
      <a href="/#why" style="font-weight:700;font-size:16px;color:#0A0A0A;text-decoration:none">Why us</a>
      <a href="/#visit" style="font-weight:700;font-size:16px;color:#0A0A0A;text-decoration:none">Visit</a>
      {{navdesktop}}
      <a href="tel:0409898232" class="sws-btn sws-btn-secondary" style="font-size:16px;padding:8px 18px">Call 0409 898 232</a>
      <a href="/#book" class="sws-btn sws-btn-primary" style="font-size:16px;padding:8px 20px">Book a free lesson</a>
    </nav>
    <button id="menu-btn" class="sws-mobileonly" aria-label="Open menu" aria-expanded="false" style="background:none;border:none;cursor:pointer;color:#142E45;width:44px;height:44px;display:flex;align-items:center;justify-content:center">
      <span id="menu-icon" style="display:flex"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg></span>
    </button>
  </div>
  <nav id="mobile-menu" class="sws-mobileonly" aria-label="Main">
    <div><div style="border-top:2px solid #EDF4FA;padding:12px 24px 20px;display:flex;flex-direction:column;gap:4px">
      <a href="/#programs" class="mm-item" style="--d:.04s">Programs</a>
      <a href="/#why" class="mm-item" style="--d:.09s">Why us</a>
      <a href="/#visit" class="mm-item" style="--d:.14s">Visit</a>
      {{navmobile}}
      <div class="mm-item" style="--d:.19s;display:flex;gap:12px;padding:8px 0 0">
        <a href="tel:0409898232" class="sws-btn sws-btn-secondary" style="flex:1">Call us</a>
        <a href="/#book" class="sws-btn sws-btn-primary" style="flex:1">Book free lesson</a>
      </div>
    </div></div>
  </nav>
</header>

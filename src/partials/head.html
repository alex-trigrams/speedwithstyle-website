<style>
  html,body{margin:0;padding:0;overflow-x:clip}
  section[id],#book{scroll-margin-top:84px}
  body{font-family:'Nunito Sans',sans-serif;color:#0A0A0A;background:#fff}
  *{box-sizing:border-box}
  [hidden]{display:none !important}
  a{color:#1B76BC}a:hover{color:#2B5E8C}
  :focus-visible{outline:3px solid #142E45;outline-offset:3px}
  html{scroll-behavior:smooth}
  .sws-wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  .sws-h2{margin:0;font-family:'Montserrat',sans-serif;font-style:italic;font-weight:900;font-size:clamp(2rem,5vw,2.75rem);line-height:1.1;letter-spacing:0.01em;text-transform:uppercase;color:#0A0A0A}
  .sws-eyebrow{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.14em;text-transform:uppercase;color:#1B76BC}
  .sws-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Nunito Sans',sans-serif;font-weight:800;border-radius:8px;border:3px solid transparent;text-decoration:none;min-height:44px;cursor:pointer;transition:background .2s cubic-bezier(.2,0,0,1),border-color .2s,color .2s;box-sizing:border-box}
  .sws-btn-primary{background:#1B76BC;color:#fff;font-size:18px;padding:12px 28px}
  .sws-btn-primary:hover{background:#2B5E8C;color:#fff}
  .sws-btn-lg{font-size:20px;padding:16px 36px}
  .sws-btn-secondary{background:transparent;color:#1B76BC;border-color:#1B76BC;font-size:18px;padding:12px 28px}
  .sws-btn-secondary:hover{background:#EDF4FA}
  .sws-btn-ghost{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.55);font-size:18px;padding:12px 28px}
  .sws-btn-ghost:hover{background:rgba(255,255,255,.22);color:#fff}
  .sws-grid{display:grid;gap:32px}
  .sws-input{font-family:'Nunito Sans',sans-serif;font-size:16px;color:#0A0A0A;background:#fff;border:2px solid #ADCDE9;border-radius:8px;padding:10px 14px;min-height:44px;width:100%}
  .sws-input:focus-visible{border-color:#1B76BC}
  .sws-label{font-weight:800;font-size:16px;color:#0A0A0A}
  .sws-err{font-size:14px;font-weight:700;color:#C2402A;display:none}
  .sws-field.has-error .sws-err{display:block}
  @media(max-width:820px){.sws-desktop{display:none !important}}
  @media(min-width:821px){.sws-mobileonly{display:none !important}}
  body{padding-bottom:0}
  @media(max-width:820px){body{padding-bottom:76px}}

  /* ===== Animations ===== */
  .rv{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,0,0,1),transform .7s cubic-bezier(.2,0,0,1);transition-delay:var(--d,0s)}
  .rv.in{opacity:1;transform:none}
  .rv-pop{opacity:0;transform:scale(.92) translateY(16px);transition:opacity .6s cubic-bezier(.2,0,0,1),transform .6s cubic-bezier(.34,1.4,.4,1);transition-delay:var(--d,0s)}
  .rv-pop.in{opacity:1;transform:none}
  .sws-kenburns{animation:sws-kb 22s ease-in-out infinite alternate}
  @keyframes sws-kb{from{transform:translateY(var(--py,0)) scale(1.02)}to{transform:translateY(var(--py,0)) scale(1.1)}}
  @keyframes sws-hero-in{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
  .hero-in{opacity:0;animation:sws-hero-in .8s cubic-bezier(.2,0,0,1) forwards;animation-delay:var(--d,0s)}
  .sws-card{transition:transform .3s cubic-bezier(.2,0,0,1),box-shadow .3s cubic-bezier(.2,0,0,1)}
  .sws-card:hover{transform:translateY(-6px);box-shadow:0 16px 44px rgba(20,46,69,.2) !important}
  .sws-card img{transition:transform .5s cubic-bezier(.2,0,0,1)}
  .sws-card:hover img{transform:scale(1.05)}
  .sws-btn:active{transform:scale(.97)}
  .sws-arrow{display:inline-block;transition:transform .25s cubic-bezier(.2,0,0,1)}
  a:hover .sws-arrow{transform:translateX(5px)}
  .sws-wave{display:block;width:100%;height:56px;margin-bottom:-1px;overflow:hidden}
  .sws-wave svg{display:block;width:200%;height:100%;animation:sws-drift 14s linear infinite}
  @keyframes sws-drift{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  #site-header.scrolled{box-shadow:0 6px 24px rgba(20,46,69,.12)}
  #mobile-menu{display:grid;grid-template-rows:0fr;opacity:0;visibility:hidden;transition:grid-template-rows .35s cubic-bezier(.2,0,0,1),opacity .3s ease,visibility 0s .35s}
  #mobile-menu>div{overflow:hidden;min-height:0}
  #mobile-menu.open{grid-template-rows:1fr;opacity:1;visibility:visible;transition:grid-template-rows .35s cubic-bezier(.2,0,0,1),opacity .25s ease}
  .mm-item{font-weight:700;font-size:18px;color:#0A0A0A;text-decoration:none;padding:12px 8px;min-height:44px;display:flex;align-items:center;opacity:0;transform:translateY(-8px);transition:opacity .3s ease,transform .3s cubic-bezier(.2,0,0,1)}
  #mobile-menu.open .mm-item{opacity:1;transform:none;transition-delay:var(--d,0s)}
  a.mm-item{color:#0A0A0A}
  #menu-icon svg{transition:transform .3s cubic-bezier(.2,0,0,1)}
  #menu-btn[aria-expanded="true"] #menu-icon svg{transform:rotate(90deg)}
  /* ===== Interior page shell ===== */
  .sws-phero{position:relative;background:#142E45;color:#fff;padding:80px 0 72px;overflow:hidden}
  .sws-phero::after{content:"";position:absolute;inset:0;background:radial-gradient(900px 380px at 78% -12%,rgba(27,118,188,.55),transparent 70%);pointer-events:none}
  .sws-phero .sws-wrap{position:relative;z-index:1;display:flex;flex-direction:column;gap:16px}
  .sws-phero .sws-eyebrow{color:#84B4DD}
  .sws-phero h1{color:#fff;max-width:820px}
  .sws-lede{margin:0;font-size:18px;line-height:1.6;color:#D6E6F4;max-width:640px}
  .sws-sect{background:#fff;padding:64px 0}
  .sws-sect-alt{background:#F7FBFD}
  .sws-prose{max-width:760px;display:flex;flex-direction:column;gap:28px}
  .sws-h3{margin:0;font-family:'Montserrat',sans-serif;font-style:italic;font-weight:800;font-size:26px;text-transform:uppercase;line-height:1.15;color:#0A0A0A}
  .sws-body{margin:0;font-size:17px;line-height:1.65;color:#4A5866}
  .sws-todo{border:2px dashed #C9DCEC;border-radius:16px;padding:24px;background:#F7FBFD;display:flex;flex-direction:column;gap:8px}
  .sws-todo strong{font-family:'Montserrat',sans-serif;font-style:italic;font-weight:900;font-size:18px;text-transform:uppercase;color:#1B76BC}
  .sws-todo p{margin:0;font-size:15px;line-height:1.6;color:#4A5866}

  /* ===== Flip cards (coach profiles) ===== */
  .sws-flipgrid{display:grid;gap:24px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
  .sws-flip{perspective:1200px;background:none;border:0;padding:0;font:inherit;text-align:left;cursor:pointer;width:100%}
  /* display:block matters — the inner/faces are spans, and min-height is
     ignored on inline elements, which collapses the whole card to nothing. */
  .sws-flip-inner{display:block;position:relative;width:100%;min-height:340px;transition:transform .65s cubic-bezier(.2,.7,.3,1);transform-style:preserve-3d}
  .sws-flip:hover .sws-flip-inner,.sws-flip[aria-pressed="true"] .sws-flip-inner{transform:rotateY(180deg)}
  .sws-flip:focus-visible{outline:3px solid #142E45;outline-offset:4px;border-radius:18px}
  .sws-flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(20,46,69,.14)}
  .sws-flip-front{background:#EDF4FA}
  .sws-flip-photo{flex:1;background:#C9DCEC;display:flex;align-items:center;justify-content:center;color:#5E7F9E}
  .sws-flip-name{padding:16px 18px;background:#fff;display:flex;flex-direction:column;gap:2px}
  .sws-flip-name strong{font-family:'Montserrat',sans-serif;font-style:italic;font-weight:900;font-size:19px;text-transform:uppercase;color:#0A0A0A}
  .sws-flip-name span{font-size:14px;font-weight:700;color:#1B76BC}
  .sws-flip-back{background:#1B76BC;color:#fff;transform:rotateY(180deg);padding:24px;justify-content:center;gap:10px}
  .sws-flip-back p{margin:0;font-size:16px;line-height:1.6;color:#EAF3FB}
  .sws-flip-hint{position:absolute;right:12px;bottom:12px;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#1B76BC;background:rgba(255,255,255,.92);padding:5px 9px;border-radius:999px;z-index:2}

  /* ===== Value cards ===== */
  .sws-valgrid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .sws-val{position:relative;background:#fff;border-radius:18px;padding:28px 24px 26px;border:2px solid #EDF4FA;overflow:hidden;display:flex;flex-direction:column;gap:12px}
  .sws-val::before{content:"";position:absolute;left:0;right:0;top:0;height:5px;background:linear-gradient(90deg,#1B76BC,#84B4DD);transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.2,0,0,1)}
  .sws-val:hover::before{transform:scaleX(1)}
  .sws-valicon{width:52px;height:52px;border-radius:14px;background:#EDF4FA;color:#1B76BC;display:flex;align-items:center;justify-content:center;transition:transform .45s cubic-bezier(.34,1.4,.4,1),background .3s}
  .sws-val:hover .sws-valicon{transform:rotate(-8deg) scale(1.1);background:#1B76BC;color:#fff}
  .sws-valnum{position:absolute;right:18px;top:14px;font-family:'Montserrat',sans-serif;font-style:italic;font-weight:900;font-size:56px;line-height:1;color:#F2F7FB;pointer-events:none;transition:color .3s}
  .sws-val:hover .sws-valnum{color:#E4EFF8}

  /* ===== Numbered steps ===== */
  .sws-steps{display:flex;flex-direction:column;gap:0;counter-reset:step;list-style:none;margin:0;padding:0}
  .sws-step{position:relative;padding:0 0 32px 62px;counter-increment:step}
  .sws-step::before{content:counter(step);position:absolute;left:0;top:0;width:42px;height:42px;border-radius:50%;background:#1B76BC;color:#fff;font-family:'Montserrat',sans-serif;font-weight:900;font-size:18px;display:flex;align-items:center;justify-content:center;transition:transform .35s cubic-bezier(.34,1.4,.4,1)}
  .sws-step:hover::before{transform:scale(1.14)}
  .sws-step::after{content:"";position:absolute;left:20px;top:46px;bottom:2px;width:2px;background:linear-gradient(#C9DCEC,#EDF4FA)}
  .sws-step:last-child{padding-bottom:0}
  .sws-step:last-child::after{display:none}

  /* ===== Auto-scrolling marquee ===== */
  .sws-marquee{overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent)}
  .sws-marquee-track{display:flex;gap:16px;width:max-content;animation:sws-marquee var(--speed,38s) linear infinite}
  .sws-marquee:hover .sws-marquee-track,.sws-marquee:focus-within .sws-marquee-track{animation-play-state:paused}
  @keyframes sws-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .sws-chip{flex:0 0 auto;display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #EDF4FA;border-radius:999px;padding:12px 22px;font-weight:800;font-size:16px;color:#142E45;white-space:nowrap}
  .sws-chip svg{color:#1B76BC;flex-shrink:0}

  /* ===== Header dropdown ===== */
  .sws-dd{position:relative}
  .sws-dd-btn{display:flex;align-items:center;gap:5px;background:none;border:0;padding:8px 0;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:16px;color:#0A0A0A;cursor:pointer}
  .sws-dd-btn svg{transition:transform .25s cubic-bezier(.2,0,0,1)}
  .sws-dd-btn[aria-expanded="true"] svg{transform:rotate(180deg)}
  .sws-dd-menu{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(-6px);min-width:210px;background:#fff;border:2px solid #EDF4FA;border-radius:14px;box-shadow:0 18px 44px rgba(20,46,69,.18);padding:8px;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .22s ease,transform .22s cubic-bezier(.2,0,0,1),visibility 0s .22s;z-index:10}
  /* A gap between button and menu would drop the hover; this bridges it. */
  .sws-dd-menu::before{content:"";position:absolute;left:0;right:0;top:-12px;height:12px}
  .sws-dd:hover .sws-dd-menu,.sws-dd:focus-within .sws-dd-menu,.sws-dd-btn[aria-expanded="true"]+.sws-dd-menu{opacity:1;visibility:visible;transform:translateX(-50%);transition:opacity .22s ease,transform .22s cubic-bezier(.2,0,0,1)}
  .sws-dd-item{padding:10px 12px;border-radius:9px;font-weight:700;font-size:15px;color:#0A0A0A;text-decoration:none;white-space:nowrap;transition:background .18s,color .18s,padding-left .18s}
  .sws-dd-item:hover{background:#EDF4FA;color:#1B76BC;padding-left:16px}

  /* ===== Bento "why choose us" grid =====
     6-col grid so the five tiles resolve cleanly instead of leaving an orphan
     row: hero spans 4, pool spans 2, then three tiles of 2 across the bottom. */
  .sws-bento{display:grid;gap:16px;grid-template-columns:repeat(6,1fr)}
  .sws-bento>*{border-radius:20px;position:relative;overflow:hidden}
  .sws-bento-hero{grid-column:span 4}
  .sws-bento-pool{grid-column:span 2}
  .sws-bento-sm{grid-column:span 2}
  @media(max-width:900px){
    .sws-bento{grid-template-columns:1fr}
    .sws-bento-hero,.sws-bento-pool,.sws-bento-sm{grid-column:span 1}
  }

  /* Hero tile — the "max 4" claim, the whole brand in one number. */
  .sws-bhero{background:linear-gradient(135deg,#142E45 0%,#1B76BC 100%);color:#fff;padding:36px 32px;display:flex;flex-direction:column;gap:18px;justify-content:center;min-height:280px}
  .sws-bhero::after{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.07);transition:transform .6s cubic-bezier(.2,0,0,1)}
  .sws-bhero:hover::after{transform:scale(1.25)}
  .sws-bnum{display:flex;align-items:baseline;gap:14px;position:relative;z-index:1}
  .sws-bnum b{font-family:'Montserrat',sans-serif;font-style:italic;font-weight:900;font-size:clamp(4.5rem,11vw,7rem);line-height:.85;color:#fff}
  .sws-bnum span{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:#84B4DD;max-width:110px;line-height:1.3}
  /* Four pips = the four kids. They fill in sequence once the tile reveals. */
  .sws-pips{display:flex;gap:10px;position:relative;z-index:1}
  .sws-pips span{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:#fff;opacity:.35;transform:translateY(6px) scale(.9);transition:opacity .45s cubic-bezier(.2,0,0,1),transform .45s cubic-bezier(.34,1.4,.4,1),background .45s}
  .sws-bento-hero.in .sws-pips span{opacity:1;transform:none;background:rgba(255,255,255,.28)}
  .sws-bento-hero.in .sws-pips span:nth-child(1){transition-delay:.35s}
  .sws-bento-hero.in .sws-pips span:nth-child(2){transition-delay:.5s}
  .sws-bento-hero.in .sws-pips span:nth-child(3){transition-delay:.65s}
  .sws-bento-hero.in .sws-pips span:nth-child(4){transition-delay:.8s}
  .sws-bhero p{margin:0;font-size:17px;line-height:1.5;color:#D6E6F4;position:relative;z-index:1;max-width:420px}

  /* Pool tile — water rises to fill the tile as it scrolls into view. */
  .sws-bpool{background:#0E2438;color:#fff;padding:28px;display:flex;flex-direction:column;justify-content:flex-end;gap:8px;min-height:280px}
  .sws-water{position:absolute;left:0;right:0;bottom:0;height:0;background:linear-gradient(180deg,rgba(27,118,188,.25),rgba(27,118,188,.8));transition:height 1.4s cubic-bezier(.2,0,0,1) .2s}
  .sws-bento-pool.in .sws-water{height:100%}
  .sws-water::before{content:"";position:absolute;left:0;top:-8px;width:200%;height:16px;background:radial-gradient(circle at 50% 100%,rgba(27,118,188,.5) 48%,transparent 50%) repeat-x;background-size:40px 16px;animation:sws-drift 5s linear infinite}
  .sws-btemps{display:flex;gap:18px;position:relative;z-index:1}
  .sws-btemp{display:flex;flex-direction:column}
  .sws-btemp b{font-family:'Montserrat',sans-serif;font-style:italic;font-weight:900;font-size:32px;line-height:1;color:#fff}
  /* Direct child only — the count-up numeral is a <span> nested inside the <b>,
     and an unscoped .sws-btemp span rule shrinks it to label size. */
  .sws-btemp>span{font-size:13px;font-weight:700;color:#84B4DD;letter-spacing:.04em}
  .sws-bpool h3{margin:0;font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;position:relative;z-index:1}
  .sws-bpool p{margin:0;font-size:15px;line-height:1.5;color:#C9DCEC;position:relative;z-index:1}

  /* Three supporting tiles */
  .sws-bsm{background:#fff;padding:28px;display:flex;flex-direction:column;gap:12px;min-height:190px;border:2px solid transparent;transition:border-color .3s,transform .3s cubic-bezier(.2,0,0,1),box-shadow .3s}
  .sws-bsm:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(20,46,69,.14);border-color:#ADCDE9}
  .sws-bsm h3{margin:0;font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;line-height:1.3;color:#0A0A0A}
  .sws-bsm p{margin:0;font-size:16px;line-height:1.5;color:#4A5866}
  .sws-bicon{width:52px;height:52px;border-radius:14px;background:#EDF4FA;color:#142E45;display:flex;align-items:center;justify-content:center;transition:transform .45s cubic-bezier(.34,1.4,.4,1),background .3s,color .3s}
  .sws-bsm:hover .sws-bicon{background:#1B76BC;color:#fff;transform:rotate(-8deg) scale(1.1)}

  /* ===== Link cards (onboarding hub) ===== */
  .sws-linkgrid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
  .sws-link{position:relative;display:flex;flex-direction:column;gap:8px;padding:24px;border-radius:16px;background:#fff;border:2px solid #EDF4FA;text-decoration:none;overflow:hidden;transition:transform .3s cubic-bezier(.2,0,0,1),box-shadow .3s,border-color .3s}
  .sws-link:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(20,46,69,.16);border-color:#ADCDE9}
  .sws-link strong{font-family:'Montserrat',sans-serif;font-style:italic;font-weight:900;font-size:19px;text-transform:uppercase;color:#0A0A0A}
  .sws-link span{font-size:15px;line-height:1.55;color:#4A5866}
  .sws-link em{font-style:normal;font-weight:800;font-size:15px;color:#1B76BC;display:inline-flex;align-items:center;gap:6px;margin-top:4px}
